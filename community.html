<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community | Physical AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="community.css">
    <style>
        #toast {
            visibility: hidden; min-width: 260px; margin-left: -130px;
            background-color: #0a1f44; color: #fff; text-align: center;
            border-radius: 30px; padding: 14px 24px; position: fixed;
            z-index: 9999; left: 50%; bottom: 40px; font-size: 0.95rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4); border: 2px solid #00e5ff;
            transition: 0.3s;
        }
        #toast.show { visibility: visible; animation: slideup 0.4s forwards; }
        @keyframes slideup { from {bottom: 0; opacity: 0;} to {bottom: 40px; opacity: 1;} }
        
        #post-viewer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,31,68,0.85); backdrop-filter: blur(12px); z-index: 4000;
            justify-content: center; align-items: center;
        }
        #post-viewer.active { display: flex; }
        .viewer-card { background: white; width: 90%; max-width: 700px; padding: 2.5rem; border-radius: 20px; position: relative; }
        .btn-close-viewer { position: absolute; top: 20px; right: 20px; font-size: 2rem; cursor: pointer; border: none; background: none; color:#ccc; transition: 0.2s; }
        .btn-close-viewer:hover { color: #666; }
    </style>
</head>
<body>
    <div id="toast">알림</div>
    
    <div id="post-viewer">
        <div class="viewer-card">
            <button class="btn-close-viewer">×</button>
            <h2 id="view-title" class="outfit" style="margin-bottom:1rem; border-bottom:1px solid #eee; padding-bottom:1.5rem; color:#0a1f44; font-size:1.8rem;"></h2>
            <div id="view-meta" style="font-size:0.9rem; color:#888; margin-bottom:2.5rem;"></div>
            <div id="view-content" style="line-height:1.8; color:#333; white-space: pre-wrap; font-size:1.05rem;"></div>
        </div>
    </div>

    <header id="main-nav">
        <div class="container">
            <a href="index.html" target="_blank" rel="noopener noreferrer" style="text-decoration: none;"><div class="logo glitch" data-text="PHYSICAL AI">PHYSICAL AI</div></a>
            
            <div class="menu-toggle" id="mobile-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <ul class="nav-links" id="nav-list">
                <li><a href="index.html" target="_blank" rel="noopener noreferrer">Home</a></li>
                <li><a href="index.html#products" target="_blank" rel="noopener noreferrer">Products</a></li>
                <li><a href="index.html#technology" target="_blank" rel="noopener noreferrer">Technology</a></li>
                <li><a href="community.html" class="active">Community</a></li>
                <li><a href="index.html#company" target="_blank" rel="noopener noreferrer">Company</a></li>
            </ul>
        </div>
    </header>

    <main class="container page-margin">
        <section class="board-header">
            <div class="tab-menu">
                <button class="tab-btn active" data-tab="notice">Notice & News</button>
                <button class="tab-btn" data-tab="blog">Tech Blog</button>
                <button class="tab-btn" data-tab="qa">Customer Q&A</button>
                <button class="tab-btn" data-tab="free">자유게시판</button>
            </div>
        </section>

        <div class="board-controls">
            <div class="search-box">
                <input type="text" id="board-search" placeholder="글 제목, 작성자 검색...">
            </div>
            <button class="btn-write" id="btn-open-write">글쓰기</button>
        </div>

        <div id="board-container">
            <table class="board-table">
                <thead>
                    <tr>
                        <th style="width:70px;">번호</th>
                        <th>제목</th>
                        <th style="width:140px;">작성자</th>
                        <th style="width:130px;">날짜</th>
                        <th style="width:100px;">상태</th>
                        <th style="width:150px;">관리</th>
                    </tr>
                </thead>
                <tbody id="board-list">
                    <tr><td colspan="6" style="text-align:center; padding:3rem; color:#aaa;">실시간 연결 대기 중...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="write-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title" class="outfit">새 글 작성</h2>
            <form id="write-form">
                <select id="post-category" required>
                    <option value="notice">Notice</option>
                    <option value="blog">Tech Blog</option>
                    <option value="qa">Q&A</option>
                    <option value="free">자유게시판</option>
                </select>
                <input type="text" id="post-title" placeholder="제목" required>
                <input type="text" id="post-author" placeholder="작성자" required>
                <textarea id="post-content" placeholder="내용을 입력하세요..." rows="10" required></textarea>
                <div style="background:#f8f9fa; padding:1.2rem; border-radius:12px; margin:1rem 0; border:1px solid #eee;">
                    <label style="display:block; margin-bottom:0.5rem; font-size:0.85rem; color:#5b6e8e; font-weight:600;">수정용 비밀번호 (필수)</label>
                    <input type="password" id="post-password" placeholder="비밀번호" required style="width:100%; border:1px solid #ddd; padding:0.9rem; border-radius:8px;">
                    <label style="display:flex; align-items:center; gap:0.6rem; margin-top:1rem; font-size:0.9rem; cursor:pointer; color:#0a1f44;">
                        <input type="checkbox" id="post-is-secret"> 비밀글로 설정하기
                    </label>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="btn-close-write">취소</button>
                    <button type="submit" class="btn-submit" id="btn-submit-post">등록하기</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Enhanced Real-Time Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, where, serverTimestamp, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpgmIpooAtWh6yfeZqjDHspWmleZEsHAI",
            authDomain: "antigra-d522e.firebaseapp.com",
            projectId: "antigra-d522e",
            storageBucket: "antigra-d522e.firebasestorage.app",
            messagingSenderId: "187294809714",
            appId: "1:187294809714:web:515728a5841ce650638ceb"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const boardList = document.getElementById('board-list');
        const writeModal = document.getElementById('write-modal');
        const modalTitle = document.getElementById('modal-title');
        const writeForm = document.getElementById('write-form');
        const submitBtn = document.getElementById('btn-submit-post');
        const toast = document.getElementById('toast');
        const postViewer = document.getElementById('post-viewer');
        
        const categoryInput = document.getElementById('post-category');
        const titleInput = document.getElementById('post-title');
        const authorInput = document.getElementById('post-author');
        const contentInput = document.getElementById('post-content');
        const passwordInput = document.getElementById('post-password');
        const secretCheckbox = document.getElementById('post-is-secret');

        const mobileMenu = document.getElementById('mobile-menu');
        const navList = document.getElementById('nav-list');

        let currentTab = 'notice';
        let editingId = null;
        let unsubscribe = null;

        if (mobileMenu) {
            mobileMenu.onclick = () => {
                navList.classList.toggle('active');
            };
        }

        function showToast(msg) {
            toast.innerText = msg;
            toast.classList.add("show");
            setTimeout(() => { toast.classList.remove("show"); }, 2500);
        }

        // --- Real-Time Update Function ---
        function syncBoard(category) {
            if (unsubscribe) unsubscribe();

            boardList.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:3rem; color:#aaa;">연결 중...</td></tr>';
            
            const q = query(collection(db, "posts"), where("category", "==", category), orderBy("createdAt", "desc"));
            
            unsubscribe = onSnapshot(q, (snap) => {
                boardList.innerHTML = '';
                if (snap.empty) {
                    boardList.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:4rem; color:#bbb;">아직 등록된 게시글이 없습니다.</td></tr>`;
                    return;
                }
                
                let idx = snap.size;
                snap.forEach(d => {
                    const data = d.data();
                    const tr = document.createElement('tr');
                    const dateStr = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleDateString() : '방금 전';
                    
                    tr.innerHTML = `
                        <td>${idx--}</td>
                        <td class="title-cell" style="cursor:pointer; font-weight:600;">${data.isSecret ? '🔒 ' : ''}${data.title}</td>
                        <td>${data.author}</td>
                        <td>${dateStr}</td>
                        <td>${category === 'qa' ? '<span class="status-tag">대기</span>' : '-'}</td>
                        <td>
                            <div class="action-btns">
                                <button class="btn-edit-it" style="padding:4px 8px; font-size:11px; cursor:pointer;">수정</button>
                                <button class="btn-delete-it" style="padding:4px 8px; font-size:11px; color:#ff3e00; cursor:pointer;">삭제</button>
                            </div>
                        </td>
                    `;
                    
                    tr.querySelector('.btn-edit-it').onclick = (e) => {
                        e.stopPropagation();
                        const pw = prompt('수정을 위한 비밀번호를 입력하세요:');
                        if (pw === data.password || pw === 'admin1234') {
                            editingId = d.id;
                            categoryInput.value = data.category;
                            titleInput.value = data.title;
                            authorInput.value = data.author;
                            contentInput.value = data.content;
                            passwordInput.value = data.password;
                            secretCheckbox.checked = data.isSecret;
                            
                            modalTitle.innerText = '게시글 수정하기';
                            submitBtn.innerText = '수정 완료';
                            writeModal.classList.add('active');
                        } else showToast('비밀번호가 일치하지 않습니다.');
                    };

                    tr.querySelector('.btn-delete-it').onclick = async (e) => {
                        e.stopPropagation();
                        const pw = prompt('삭제 비밀번호:');
                        if (pw === data.password || pw === 'admin1234') {
                            if (confirm('게시글을 삭제하시겠습니까?')) {
                                await deleteDoc(doc(db, "posts", d.id));
                                showToast('성공적으로 삭제되었습니다.');
                            }
                        } else showToast('비밀번호가 틀렸습니다.');
                    };

                    tr.querySelector('.title-cell').onclick = () => {
                        if (data.isSecret) {
                            const pw = prompt('비밀글 확인용 비밀번호:');
                            if (pw !== data.password && pw !== 'admin1234') return showToast('조회 권한이 없습니다.');
                        }
                        document.getElementById('view-title').innerText = data.title;
                        document.getElementById('view-meta').innerText = `작성자: ${data.author} | 날짜: ${dateStr}`;
                        document.getElementById('view-content').innerText = data.content;
                        postViewer.classList.add('active');
                    };
                    boardList.appendChild(tr);
                });
            });
        }

        // --- Interaction Handlers ---
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                currentTab = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                syncBoard(currentTab);
            };
        });

        document.getElementById('btn-open-write').onclick = () => {
            editingId = null;
            writeForm.reset();
            modalTitle.innerText = '새 글 작성';
            submitBtn.innerText = '등록하기';
            categoryInput.value = currentTab;
            writeModal.classList.add('active');
        };

        document.getElementById('btn-close-write').onclick = () => writeModal.classList.remove('active');
        document.querySelector('.btn-close-viewer').onclick = () => postViewer.classList.remove('active');

        // Form Submit Logic
        writeForm.onsubmit = async (e) => {
            e.preventDefault();
            
            const postObj = {
                category: categoryInput.value,
                title: titleInput.value,
                author: authorInput.value,
                content: contentInput.value,
                password: passwordInput.value,
                isSecret: secretCheckbox.checked,
                updatedAt: serverTimestamp()
            };

            const currentEditingId = editingId;
            writeModal.classList.remove('active');
            showToast('서버와 동기화 중...');

            try {
                if (currentEditingId) {
                    await updateDoc(doc(db, "posts", currentEditingId), postObj);
                    showToast('성공적으로 수정 반영되었습니다.');
                } else {
                    postObj.createdAt = serverTimestamp();
                    await addDoc(collection(db, "posts"), postObj);
                    showToast('성공적으로 등록 완료되었습니다.');
                }
                editingId = null;
            } catch (err) {
                console.error("Save error:", err);
                showToast('반영 중 오류가 발생했습니다.');
                editingId = null;
            }
        };

        // Initial Load
        syncBoard('notice');
    </script>
</body>
</html>
